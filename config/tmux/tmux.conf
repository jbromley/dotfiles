# Tmux configuration

########################################################################
# General options
########################################################################

set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-option -g set-titles on
set-option -g status-position bottom

# tmux-sensible-style settings
set-option -s escape-time 0
set-option -g history-limit 65536
set-option -g display-time 2000
set-option -g status-interval 5
set-option -g default-terminal "tmux-256color"

# Terminal capabilities
set-option -ga terminal-overrides 'alacritty:Tc,foot:Tc,xterm-256color:Tc,xterm-kitty:Tc'
set-option -as terminal-features ',xterm-256color:clipboard,alacritty:clipboard,foot:clipboard,xterm-kitty:clipboard'

set-option -g focus-events on
set-window-option -g aggressive-resize
set-window-option -g automatic-rename on

# Mouse and clipboard
set-option -g mouse on
set-option -s set-clipboard external

# Improve sixel / terminal passthrough handling
set-option -g allow-passthrough on
set-option -ga update-environment TERM
set-option -ga update-environment TERM_PROGRAM

########################################################################
# Key bindings
########################################################################

# Use vi-style keys
set-window-option -g mode-keys vi
set-window-option -g status-keys vi

# Use Ctrl-Space as prefix
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Reload config
bind-key R run-shell 'tmux source-file ~/.config/tmux/tmux.conf >/dev/null 2>&1; tmux display-message "Sourced ~/.config/tmux/tmux.conf"'

# Cycle layouts
bind-key ` next-layout

# Vi-style pane movement
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-line-and-cancel

# Paste system clipboard into tmux buffer, then paste
# Tries Wayland first, then xsel, then xclip
bind-key P run-shell 'tmux set-buffer -- "$(xsel --clipboard --output 2>/dev/null)" \; paste-buffer'

# Jump to previous/next prompt in copy mode
bind-key -T copy-mode n send-keys -X next-prompt
bind-key -T copy-mode p send-keys -X previous-prompt

########################################################################
# Style
########################################################################

# General status bar style
set-option -g status on
set-option -g status-style 'fg=white,bg=black'

# Keep window list tight
set-option -g window-status-separator ' '

# Status left: [ host ] [ session ]
set-option -g status-left-length 32
set-option -g status-left '#[fg=black,bg=magenta] #H #[default] #[fg=black,bg=green] #S #[default] '

# Window list
set-option -g window-status-style 'fg=white,bg=black'
set-option -g window-status-format ' #I:#{pane_current_command} '

# Current window
set-option -g window-status-current-style 'fg=black,bg=white,bold,italics'
set-option -g window-status-current-format ' #I:#{pane_current_command}* '

# Bell / urgent window
set-option -g window-status-bell-style 'fg=black,bg=red'

# Status right: [ pane title ] [ date/time ]
set-option -g status-right-length 64
set-option -g status-right '#[fg=black,bg=green] #T #[default] #[fg=black,bg=magenta] %a %b %e %H:%M #[default]'
